name: Build and Push Multi-Arch Image

on:
  workflow_run:
    workflows: ["Release"]
    types: [ completed ]
  workflow_dispatch:

env:
  REGISTRY_GHCR: ghcr.io
  GHCR_REPO: ghcr.io/discordanalytics/api

jobs:
  build:
    if: >
      github.event_name != 'workflow_run' || 
      github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        feature: [full, mails, reports, none]
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - feature: full
            args: "--features full"
            suffix: "-full"
          - feature: mails
            args: "--features mails"
            suffix: "-mails"
          - feature: reports
            args: "--features reports"
            suffix: "-reports"
          - feature: none
            args: "--no-default-features"
            suffix: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REPO }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push by Digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: BUILD_ARGS=${{ matrix.args }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.GHCR_REPO }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.feature }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        feature: [full, mails, reports, none]
        include:
          - feature: full
            suffix: "-full"
          - feature: mails
            suffix: "-mails"
          - feature: reports
            suffix: "-reports"
          - feature: none
            suffix: ""
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.feature }}-*
          merge-multiple: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest and push
        working-directory: /tmp/digests
        run: |
          TAGS="-t ${{ env.GHCR_REPO }}:latest${{ matrix.suffix }}"
          
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            TAGS="$TAGS -t ${{ env.GHCR_REPO }}:${VERSION}${{ matrix.suffix }}"
          fi
          
          if [[ "${{ matrix.feature }}" != "none" ]]; then
            TAGS="$TAGS -t ${{ env.GHCR_REPO }}:${{ matrix.feature }}"
          fi
          
          docker buildx imagetools create $TAGS \
            $(printf '${{ env.GHCR_REPO }}@sha256:%s ' *)