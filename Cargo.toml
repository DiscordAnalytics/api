[package]
name = "api"
version = "3.0.0"
authors = ["ValDesign"]
edition = "2024"
description = "Official DiscordAnalytics API"
readme = "README.md"
homepage = "https://discordanalytics.xyz"
repository = "https://github.com/DiscordAnalytics/api"

[dependencies]
actix-web = { version = "4.12.1", default-features = false, features = [
  "macros",
] }
anyhow = { version = "1.0.101", default-features = false, features = ["std"] }
chrono = { version = "0.4.43", default-features = false, features = [
  "clock",
  "serde",
] }
dotenvy = { version = "0.15.7", default-features = false }
mongodb = { version = "3.5.1", default-features = false, features = [
  "bson-3",
  "compat-3-3-0",
  "dns-resolver",
  "rustls-tls",
] }
opentelemetry-appender-tracing = { version = "0.31.1", default-features = false }
opentelemetry_sdk = { version = "0.31.0", default-features = false, features = ["logs"] }
tokio = { version = "1.49.0", default-features = false, features = [
  "rt-multi-thread",
  "macros",
] }
tracing = { version = "0.1.44", default-features = false, features = ["std"] }
tracing-appender = { version = "0.2.4", default-features = false }
tracing-subscriber = { version = "0.3.22", default-features = false, features = [
  "ansi",
  "fmt",
  "std",
] }
opentelemetry-otlp = { version = "0.31.0", default-features = false, features = ["logs", "http-proto", "reqwest-rustls"] }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[profile.release]
opt-level = "z"
codegen-units = 1
lto = true

[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=lld"]

[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"
